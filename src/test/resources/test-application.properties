# jdbc.X - H2 in-memory database for integration tests
jdbc.driverClassName=org.h2.Driver
jdbc.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=USER
jdbc.username=sa
jdbc.password=

# hibernate.X
hibernate.dialect=org.hibernate.dialect.H2Dialect
hibernate.show_sql=true
# validate | update | create | create-drop
hibernate.hbm2ddl.auto=create-drop

# Messaging - JMS (not used in tests)
jms.brokerUrl=vm://localhost?broker.persistent=false
